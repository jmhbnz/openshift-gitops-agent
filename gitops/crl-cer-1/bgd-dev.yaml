---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
  name: bgd-dev
  namespace: argocd
spec:
  destination:
    name: in-cluster
    namespace: bgd
  project: crl-cer
  source:
    path: apps/base
    repoURL: https://github.com/jmhbnz/openshift-gitops-agent
    targetRevision: HEAD
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
