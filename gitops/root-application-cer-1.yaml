---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
  name: app-of-apps
  namespace: argocd
spec:
  destination:
    name: in-cluster
    namespace: argocd
  project: crl-cer
  source:
    path: gitops/crl-cer-1
    repoURL: https://github.com/jmhbnz/openshift-gitops-agent
    targetRevision: HEAD
  syncPolicy:
    automated:
      selfHeal: true
